# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - polymtkcp

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test
        # Tests must pass before we publish or deploy. The build above already
        # produced the test assemblies, so --no-build keeps the step fast.
        run: dotnet test PolymtkCp.Tests/PolymtkCp.Tests.csproj --configuration Release --no-build --nologo --verbosity normal

      - name: dotnet publish
        # Scope publish to the web project so the test project (and its xUnit
        # runner DLLs) never end up in the artifact uploaded to App Service.
        run: dotnet publish PolymtkCp/PolymtkCp.csproj -c Release --no-build -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8FD06D2C35DD493F839AC44E42571036 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_58982873EAF144F395D0219FDC693922 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_13A2D003577748C1926D419F3C668D7E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'polymtkcp'
          slot-name: 'Production'
          package: .
          